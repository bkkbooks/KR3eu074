body:
  text: 一緒言鹿茸者在漢藥中古時期其高貴之程度與人參有如雙璧至今中國藥店招牌猶書參茸二字以示藏有珍材也其使用之古與價格之貴可想而知雖今日猶重視如昔本物質必有特奇藥效也亦可想而知矣但其藥效藥理自昔少研究之者故余思追究其終為何物有何藥效具何種成分欲將疑點揭破盡得其所以然而後判定古傳藥品之真正價值是以開始作此研究然須先應明者本物質於古漢醫學中具如何之傳統旦亦為此次研究之指南針故本篇依晚近漢方古醫書作史績之研究藉窺其要旨焉二鹿茸之定義漢方醫學指鹿茸為如何物其定義與時代有無變遷徵諸史績抱朴子曰一南山多鹿每一雄遊牝百數至春羸瘦入夏性食菖蒲即肥當角解之時其茸甚痛獵人得之以索擊住取茸然後斃鹿鹿之血未散也圖經本草曰二以形如小紫茄子者為上強云茄子茸太嫩其血未具不若分歧如馬鞍形者有力本草衍義曰三茸最難得不破及不出卻血者蓋其力在血中獵時多有損傷故也凡用無須太嫩唯長四五寸茸端如瑪瑙紅者最佳本草備要曰四鹿角初生長二三寸分歧如鞍戲如瑪瑙紅之如朽木者良太嫩者血氣未定無力鹿茸之定義為未脫角皮之鹿之嫩角也雖經各代仍無懸殊然非甚嫩擇其通血髓者且於生前剝取之者則近乎佳品矣採取鹿茸鹿之種類余未能甚詳也而最近於滿洲漢藥市場得悉鹿茸分為二種有花鹿及馬鹿之稱花鹿體小身有花紋馬鹿大無花紋也其價格亦隨之有云泥之差花鹿之茸乃上品也雖一兩其值亦越銀百元反之馬鹿之耳乃下品也僅不過二三元花鹿乃俗名學名為日名至馬鹿者亦俗名學名日名即指此之謂歟暫存此疑以俟將來再證明之中國本土鹿之種類國譯本草綱目謂其學名為木村氏於同書之頭注附記云高山地方有存在北華有此外鹿之種類尚多今千金翼方出藥州土記載之處觀之當唐時檢其鹿茸及鹿角之產地如汝州今之河南省臨安縣治許州同上許昌縣治豫州同上汝南縣治唐州同上泌陽縣治涼州甘肅省涼州府鳳州陝西省鳳縣揚州江蘇省江都縣治秦州甘肅省天水縣治等地皆際江北諸地又李時珍於集解曰鹿處處山林中有之而未示產地也如是則古來鹿茸之產出無特定地點亦即鹿之種類無區分之要也所謂古之鹿茸乃麋茸也麋之學名於國譯本草綱目曰日名木村氏於同書頭注曰北華稱麋即學名也然確實是否尚未敢定據本草書所記者生於東海坿近之水邊群棲之者再尋其所蹤則於神農本草經四之中品載有鹿茸又其下品中載有麋脂而麋茸之名未見也然茸之屬麋有何根據以余所知其最初述之者於新修本草五麋脂條下記載者有之謹案麋茸服之功力勝鹿茸角煮為膠亦勝白膠也較此以往有劉宋之雷斅曰鹿角堅好勝如麋角斯恐角與茸同意之言也宋時代鹿麋各陰陽相配其論猶多紛雜即如圖經本草二曰今醫家多貴麋茸麋角力緊於鹿沈存中筆談七曰麋茸利補陽鹿茸利補陰蘇東坡良方八曰鹿陽獸見陰而角解麋陰獸見陽而角解故補陽以鹿角為勝補陰以麋角為勝其不同如此但云鹿勝麋麋勝鹿疏矣鹿與麋在藥理上各有所長而不能云兩者效力有優劣也據其長處與沈括所論者相反李時珍九引蘇軾前文曰按此說與沈存中鹿茸利補陰麋茸利補陽之說相反以理與功推之蘇說為是惟麋鹿配陰陽於馬融之禮記月令二曰仲夏鹿角解仲冬麋角解此根據宋儒論者唐以前認鹿麋茸角有同等效力無非議其優劣而已可觀炮炙論及新修本草即明矣又本草衍義曰今人用麋鹿茸作一種本草綱目亦云今獵人多不分別往往以麋為鹿又云麋鹿角茸今人罕能分別陳自明以小者為鹿茸大者為麋茸亦臆見也不若親視其採取時為有準也此外本經逢源一二日近世鹿茸與麋茸罕能辨別本草述一三亦云麋鹿茸角所稟之氣既異然用之罕能分別麋鹿配陰陽而論其得失屬學者之機上論實則麋鹿混淆應用之事系事實也三鹿茸之應用一唐以前醫藥中應用鹿茸參照中國曆代本草書並唐宋之主要醫方書可察其概要也中國應用鹿茸自何時始徵諸史績如今之證類本草分所謂黑字白字最足傳陶弘景校定之神農本草經之俤此可知收載白膠於其本經之上品鹿茸於其中品麋脂於其下品再參照陶弘景之序文最晚於後漢時代本品已供醫藥用品無疑也再溯諸以往中尾博士一四一五云山海經中山經部於劑之咸王或宣王時代或至晚於秦始皇以前亦有記載再於同書之中山經及西山經之諸山記有產鹿及麋再於周禮天官塚宰載有庖人獸人等制庖人司六畜六獸六禽亦能辨別之獸人專罟田獸亦能辨別之冬則獻狼夏則獻麋春秋獻獸物鄭眾庖人注曰以麋鹿熊麕野豕兔為六畜由是可知鹿麋之供食用其由來久矣雖山海經未記鹿麋之用途亦無特別提出茸角等文字然以常識想像之當先秦之際考究長命卻病藥物諸方士如山海經乃關於藥物記述之書若鹿麋者自古既為最佳食品且其角茸又具特殊形態發育甚速之鹿茸豈能無方士十分注目之乎其藥效想自古代即有考究之矣蓋昔時食物與藥物無區別因此供內服者自植物至動物頗多自山海經內容觀之則易明也然鹿茸之應用假如自先秦時代始以如何之目的應用之尚不明也神農氏本草經曰一六鹿茸味甚溫主漏下惡血寒熱驚癇益氣強志生齒不老又名醫別錄曰一七酸微溫無毒療虛勞洒洒如瘧羸瘦四肢痠疼腰脊痛小便利泄精溺血破留血在腹散石淋癰腫骨中熱疸癢由是觀之最晚於後漢西晉之間強精還老之處有漏下惡血寒熱驚癇等效再於六朝時代治虛勞羸瘦四肢痠痛腰脊痛遺尿遺精血尿尿石等外如癰腫疸瘍皮膚疾患亦應用之再關於鹿角本經曰一六角主惡瘡癰腫逐邪惡氣留血在陰中主外科疾患應用之又別錄云一七味鹹無毒除小腹血急痛腰脊痛折傷惡血益氣與鹿茸所治者概一致也即本經所記茸主有益精還老之效角主治皮膚外科疾患也如斯兩者效用有截然之分再依上開別錄記事與肘後方一八之治卒患腰脅痛諸方有鹿角長六寸燒搗末酒服之鹿茸尤佳之記載復觀之於六朝以降諸說二者於應用之後似有同等之效力對如是之諸症鹿茸或角依何種方法而應用之乎史績之記載不豐今引證類本草一九百一方二曰若男女喜夢與鬼交通致恍惚者截鹿角屑三指撮日二服酒下又深師方二一曰治馬鞍瘡鹿角灰酢和塗之上記兩書皆陶弘景以前舊書而遺至今者如深師方即系僧深錄晉人支法存之書及諸家舊方而成者上記者皆關於鹿角之事而於茸亦同樣製成粉末內服之外亦有製成粉末或膏以供外用者二唐時代據唐代甄權之藥性論二二曰鹿茸君味苦辛主補男子腰腎虛冷腳膝少力夜夢鬼交精液自出女人崩中漏血炙末空心服方寸七亦主赤白帶下入散用即主治男女益精婦人子宮出血帶下等效茲就唐代代表醫方書之千金方及外臺秘要方中撰出鹿茸配伍之處方其主治症候分類處方如下一千金要方二三計二十三例補腎及補益計十例崩漏及帶下計九例此外虛冷金瘡消渴多尿遺尿各一計四例二千金翼方二四計十例補益內服計三例崩中計三例多尿計二例此外解散金瘡各一計二例三外臺秘要方二五計二十二例補益補精計四例崩中計二例腰痛計五例下血赤白痢計二例消渴多尿計四例遺尿計三例此外小便赤積聚各一計二例上記處方例悉非以鹿茸為主劑以鹿茸為主藥者僅其中一少部分而應治諸症則為必不可缺者自然之趨勢也古傳諸書昔人頗為重視故今觀之甚足窺鹿茸應用之大要也亦即今世強精補益延年崩中滯下消渴多尿遺尿等症時時應用之原或者腰痛下血痢疾尿血金瘡等亦應用之由也至其用法自種種處方例依其藥形分類如下自上表觀之任何人皆以散劑為最丸劑次之湯劑又次之且以鹿茸為主藥處方例言之皆以散劑丸劑而湯劑者決不之見蓋丸劑散劑僅加以簡單之理學的工程易製作也湯劑自與其本質相異然中國古時鹿茸專用以散劑而不用以湯劑者思必有相當可注目之點也三宋及其以降宋時代鹿茸之應用大體無異於前時代特以補益為目的虛弱症恆應用之如食療本草曰二六鹿茸主益氣角主癰疽瘡腫除惡血若腰脊痛折傷多取鹿角並截取尖錯為屑以白密淹浸之微火熬令小變色曝乾持篩令細以酒服之輕身益力強骨髓補陽道又小兒以煮小豆汁和鹿角灰安重舌下日三度又日華子本草曰二七鹿茸補虛羸壯筋骨破瘀血殺鬼精安胎下氣酥炙之角療惡瘡癰腫熱毒等醋磨傅脫精尿血夜夢鬼交並治之水磨服小兒重舌鵝口瘡炙熨之其所記者概與神農本草經一致惟重舌蝦蟆腫及鵝口瘡有效為初次發見於今宋代代表之醫方書為三因方二八本事方二九和劑局方三等所收載之鹿茸配伍處方依其要旨強為分類如下一三因方計十例補益計六例遺尿計二例消渴計二例二本事方計五例補益四例治風一例三和劑局方計八例補益七例治風一例上述於宋時代鹿茸專為補益之目的然收載例數頗少再閱政和年間敕修之聖濟總錄三一鹿茸並鹿角鹿角膠等配伍之處方有一五五種以上其中以鹿茸或鹿角為主藥之處方有五三種依其主治分類如下補益補虛計三十例崩漏帶下計五例多尿計六例血尿計一例耳鳴計二例癰疽計三例小兒痢疾計一例乳腺炎水腫癩病痔疾鬼魅各一例如斯則補益居數為多崩漏消渴等次之但本書乃集天下之名醫合古今之秘笈而成雖不能盡為昔時所實行者而與前記諸書比較之則可推知於宋代以鹿茸特多用為補益者也至用藥之方法自前記四書中處方例觀之如下如上表觀之本時代主於丸方而應用之湯方散方極少唐時代散方比丸方多自此點思之不無感興味也至元明以降其應用用法概與宋代同既畏其說之冗長又無特見故割捨之不復贅述四鹿茸之藥理前章所敘者中國應用鹿茸為藥物遠自先秦時代晚自後漢以來主供益精還老之目的而持續存用者也但本品物質之藥效於歷代漢方醫家具有何種藥理之見解茲窺其大略之要如下凡一種物質初供為藥物時必基一定哲理或信仰或者豫想有藥效而應用之或不以以上之原因而用者時亦有之但鹿茸自發現之初即認有藥效歟抑系因與肉同供食用於經驗中始明其有藥效歟此中情跡雖未有詳述然於文史中可以搜索而得其大概如述異記三二曰鹿一千年成蒼鹿又百年化白鹿又五百年化元鹿漢成帝時山中人得元鹿烹之而視其骨皆黑色也仙人以元鹿為脯如食此可壽二千歲云又抱朴子亦云鹿壽千歲滿五百歲者則色白此外鹿為長壽之獸或稱仙獸或稱陽獸散見於諸書而鹿茸之形態一見如陽根精氣之本血液多量具藏於此以及寇宗奭之所云其成長頗速之諸事實可充分信古人用為有補陽之效是故如肯定其最初即豫想有一定藥效而後使用之者亦不可厚非也神農本草曰一六鹿茸為養命之藥列於上經玉房秘訣三三乃彭祖之所傳以麋角用為房中藥陶弘景三四曰如服麋角大有補益此亦述彭祖傳也孟詵三五亦云麋茸乃仙家之珍重自鹿麋茸角方甚多收載之點觀之想千金方及此外方書系出自道教也歟而此等藥用與方士之間有甚深密接之關係可想見矣關於此點如非再考證之則難斷也漢代神農本草經四記載諸藥之氣味又周禮之鄭眾注三四亦載有狼膏聚麋膏散聚則溫散則涼以救時之苦也自此點觀之關於當時藥理已可推得有相當解釋至關於鹿茸之藥效加以何如見解今雖不能詳惟徵諸韓退之四云王師授鹿䘒丸方云鹿稟純陽而䘒者天地初分之氣牝牡相感之精也醫書稱鹿茸角血髓大有補益而此䘒則入神矣雖䘒與茸有異要之以陽補陽說為比較單純之解釋則明矣至宋如前章所述沈括蘇軾等儒者有鹿麋茸角之補陰補陽說外本草衍義三記有凡麋鹿角自生至堅完無兩月之久大者二十餘斤其堅如石計一晝夜須生數兩凡骨之類成長無速於此雖草木最易於生長者亦無能及之豈可與凡骨血為比如是原始之觀察似更在以前之時代即既用之矣惟宋代無何藥理之解說而真正藥理醫學的解說以明之繆希雍為嚆矢即於本草經疏三七關於鹿茸鹿角麋角白膠等基於各神農本草經之本文解說鹿茸之藥理如下鹿茸稟純陽之質含生髮之氣故其味甘氣溫別錄言酸微溫氣薄味厚陰中之陽也入手厥陰足少陰厥陰經婦人衝任脈虛則為漏下惡血或瘀血在腹或為石淋男子肝腎不足則為寒熱驚癇或虛勞洒洒如虛或羸瘦四肢痠疼腰脊痛或小便數利泄精溺血此藥走命門心包絡及腎肝之陰分補下元真陽故能主如上諸症及益氣強志生齒不老也癰腫疽皆榮氣不從所致甘溫能通血脈和腠理故亦主之此說乃基於漢醫之學說故以今日之醫學的常識而欲瞭解之匪易事也如謂氣味陰陽所入經路等語皆屬哲理之空說因人而異乃亦自然之事也故清之劉若金著本草述三九引用繆希雍之說而謂繆氏謂鹿為純陽之質固然但云茸亦純陽並謂陰之陽則誤矣鹿茸角皆為陽中之陰也斯為因陰陽之見解而異其說再謂昔蜀一道人市斑龍丸每醉高歌曰尾閭不禁滄海竭九轉靈丹都慢說惟有斑龍頂上珠能補玉堂闕下穴其方用鹿茸鹿角膠鹿角霜也夫玉堂闕下穴即膻中膻中者心主之宮城也經曰胞脈者屬心而絡於胞中胞中為精血之所聚而其脈固絡於心心胞絡主血會此所以謂其為能療男子漏精尿血女子崩漏也至繆氏言其入四經而奏功是也第謂純陽則大誤若鹿茸則補命門真陽不可與鹿茸例論也此皆為一種空理空論也清季藥理說頗多而悉據神農經之說加以註疏其見解雖不一致然都基陰陽之哲理而成為空想空論今僅摘其一二如下張璐三九曰鹿茸效用專主傷中勞絕腰痛羸瘦取其補火助陽生精益髓強筋健骨固精攝便下元虛人頭旋眼黑皆宜用之本經治漏下惡血是陽虛不能統陰即寒熱驚癇皆肝腎精血不足所致也角乃督脈所發督為腎臟外垣既固腎氣內充命門相火不致妄動氣血精澤得以凝聚扶陽固陰非他草木可比張陰庵曰鹿性純陽息通督脈茸乃骨精之餘從除透頂氣味甘溫有火土相生之義主治漏下惡血者土氣虛寒則惡血下漏鹿茸稟火氣而溫土從陰出陽下者舉之而惡血不漏矣寒熱驚癇者心為陽中之太陽陽虛則寒熱心為君主而藏神神虛則驚癇鹿茸陽剛漸長心神充足而寒熱驚癇自除矣益氣強志者益腎臟之氣強腎臟之志也生齒不老者齒為骨之餘從其類而補之則腎精日益故不老葉天士曰四二鹿茸氣溫稟天春升之木氣入足厥陰肝經味甘無毒得地中正之土味入足太陰脾經氣味俱升陰也肝臟血脾統血肝血不臟脾血不統漏下惡血矣鹿茸氣溫可以達肝味升可以扶脾所以主之也寒熱驚癇者驚癇而發寒熱也蓋肝為將軍之官肝血虛則肝氣亢挾濁火上逆或驚或癇矣鹿茸味甘可以養血氣溫可以導火所以止驚癇之寒熱也益氣者氣溫則益陽氣味甘則益陰氣也甘溫益陰陽之氣氣得剛大而志強矣鹿茸骨屬也齒者骨之餘也甘溫之味主生長所以生齒真氣充足氣血滋盛所以不老也陳修園四三曰鹿為仙獸而多壽其臥則口鼻對尾閭以通督脈督脈為通身骨節之主腎主骨故又能補腎腎得其補則志強而齒固以志藏於腎齒為骨余也督得其補則大氣升舉惡血不漏以督脈為強氣之總督也然角中皆血所貫沖為血海其太補衝脈可知也凡驚癇之病皆挾衝脈而作陰氣虛不能寧謐於內則附陽而上升故上熱而下寒陽氣虛不能周衛於身則隨陰而下陷故下熱而上寒鹿茸內衝脈而太補其而所以能治寒熱驚癇也至於長而為角別錄謂其主惡瘡逐惡氣以一點胚血發泄亡盡只有拓毒消散之功也知上記於清朝時代非但鹿茸即神農本草經中種種藥品皆收載考證而加以詮釋上記數例亦可知其詮釋之梗概即同為讀本經本文者亦有甲乙之別至其藥理之解說各主其說未有一致者蓋可謂哲理的醫學之通弊歟五鹿茸之調製法鹿茸自古即主用丸劑與散劑曾於前敘之矣鹿茸採取後以何種方法制成粉末乎別錄一七曰四月五月解角時取陰乾使時燥上記乃陰乾法蘇敬五則以陰乾法為不可主張火干法而謂鹿茸夏收收陰乾百不收一從得一干臭不任用破之火干大好自古茸以他物塗布而調製之如雷斅六載有塗以天靈蓋與羊脂或以黃精自然汁浸之之法而謂凡使先以天靈蓋作末然後鋸解鹿茸作片子以好羊脂拌天靈蓋末塗之於鹿茸上慢火炙之令內外黃脆了用鹿皮一片裹之安室上一宿其藥鬼歸也至明則以慢火焙之令脆方搗作末用之每五兩鹿茸用羊脂三兩炙盡為度又製法用黃精自然汁浸兩日夜了漉出焙令乾細搗用免渴人也然應用天靈蓋法一般用否尚屬疑問但可知六朝時藥品調製法甚進步也於唐時代行何種方法詳細不明千金方論合和第七載有凡用諸毛羽齒牙蹄甲龜鱉鮫鯉等甲皮肉骨角筋鹿茸等皆炙之又於翼方及外臺秘要處方中於藥名之下指定分量與特殊之調製法對於鹿茸常記一炙字似炙之使成脆弱作為粉末而用之者又千金方論合和第七亦載有凡湯中用麝香犀角鹿角羚羊角牛黃須末如粉臨服內湯中攪令謂和服之佐上記可知雖湯劑亦須豫作粉末然後攪拌湯中而用之決非用以浸煎等法也再雖宋代亦同樣主用炙法在炙之先要燎去毛或豫以酥醋酒等塗後炙之三因方二八處方中記鹿茸多雲酥炙方燎去毛切酥炙去毛切炙去毛切醋灸酸塗炙去毛盡等又和劑局方亦同樣記有燎去毛擘開酒浸炙乾燎去毛酥炙去毛淨約三寸截斷酒浸伏時慢火炙脆燎去毛酒浸炙醋炙酒炙去毛塗酥炙微黃等蓋豫塗以酥醋者欲防傷茸之實質也本草衍義曰三茸上毛先薄以酥塗勻於烈焰中急灼之若不先以酥塗恐火焰傷耳俟毛淨微炙入藥明清時代似亦行同樣方法本草綱目曰澹寮劑生諸方有用酥多及酒蒸焙用者當各本方本經逢源亦云鹿茸酥炙酒炙各隨本方但不可過焦有傷氣血之性炙後去頂骨用茸現今市中販賣者厚參薄片至調製法之詳製藥者秘而不語概踏襲明清之舊法也六總括總括上述所論如下一鹿茸之定義雖歷各代仍無大差為未脫角皮之嫩角也恃以不甚嫩而尚通血髓且於生前剝取之者似為佳品然鹿之種類非特定二麋茸之藥效與鹿茸相反者蓋基於馬融之禮記月令所記因宋儒而成此論鹿麋配陰陽而論其得失者屬於學者之機上論實則六朝以來麋鹿似已混淆應用之矣三於中國鹿茸自何時始入藥用雖屬不詳然在先秦時代既已開始使用麋鹿為食品由此推想至遲在後漢時即供藥品應用也明矣四鹿茸之應用分唐以前唐時代及宋以降之時代而考證之自後漢以來主供益精還老之目的且與鹿角皆供皮膚疾患之應用特自宋以降以補益之目的而應用之者為最至用於重舌蝦蟆腫及鵝口瘡為有效者以日華本草為嚆矢五在中國鹿茸於種種目的而應用之之藥形雖歷各代仍無所異唐以前主以粉末內服或以粉末或膏供於外用唐時代散劑中者最多丸劑次之湯劑以鹿茸為主藥之處方例則未之見宋以後用於丸劑之處方中者最多湯方散方亦極少六鹿茸之藥理因以鹿為長壽之獸或仙獸或陽獸之思想及鹿茸之形態含血之況以及其長成頗速等之事實故思必有一定藥效始供藥物而應用之至漢代以陽補陽之說為單純之解釋即宋亦無何藥理之解說與以正真藥理醫學的解說者以明繆希雍為嚆矢然其所說皆屬哲理的空說此後入清季尚有許多學者解說雖其各說皆異但始終皆為空理空論無一足可首肯之者七鹿茸之調製法於別錄記有陰乾法蘇敬主以火干法雷斅以後則豫以酥醋酒等抹之以防茸實質之損傷此法歷明清而至今日仍沿用之
